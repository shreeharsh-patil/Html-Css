<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lists and Divs</title>
    <style>
        body {
            background-color: #FFFFE0;
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        div {
            margin-bottom: 20px;
            padding: 10px;
            border: 1px dashed gray;
        }
        h3 {
            color: #333;
        }
    </style>
</head>
<body>
    <h3>Unordered List</h3>
    <div>
        <ul>
            <li>Information Technology (IT)</li>
            <li>Computer Science (CS)</li>
            <li>Mechanical (Mech)</li>
            <li>Civil</li>
        </ul>
    </div>

    <h3>Ordered List</h3>
    <div>
        <ol>
            <li>Information Technology (IT)</li>
            <li>Computer Science (CS)</li>
            <li>Mechanical (Mech)</li>
            <li>Civil</li>
        </ol>
    </div>
    
    <div>
        <h1>Greetings!</h1>
    </div>
</body>
</html>
