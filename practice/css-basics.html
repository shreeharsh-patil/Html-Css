<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Basics Demonstration</title>
    <style>
        body {
            background-color: rgb(252, 255, 87);
            background-image: url("assets/google-logo.jpg");
            background-repeat: repeat;
            background-size: 100px;
            background-position: center;
            margin: 0;
            padding: 0;
        }
        p {
            color: rgb(0, 0, 0);
            font-size: 30px;
            font-family: cursive, sans-serif;
            text-align: center;
        }
        h1 {
            color: black;
            font-size: 20px; /* Fixed syntax from 'font: size 20px' */
            font-family: 'Times New Roman', Times, serif;
            text-align: center;
        }
        div {
            border: 1px solid rgb(255, 151, 151);
            margin-top: 100px; /* Reduced for better visibility */
            margin-bottom: 50px;
            margin-right: 100px;
            margin-left: 100px;
            background-color: rgb(243, 209, 55);
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div>
        <h1>Hi Hello</h1>
    </div>

    <div>
        <p>Shreeharsh</p>
    </div> 
</body>
</html>
