<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Padding Example</title>
    <style>
        div {
            border: 2px solid black;
            background-color: yellow;
            padding-top: 50px;
            padding-bottom: 50px;
            padding-right: 30px;
            padding-left: 80px;
            text-align: center;
            font-family: 'Verdana', sans-serif;
            margin-top: 50px;
        }
    </style>
</head>
<body>
    <div>
        <h1>This Is A Container With Custom Padding</h1>
    </div>
</body>
</html>
