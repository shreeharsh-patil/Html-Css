<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Classes Demo</title>
    <style>
        .para1 {
            font-family: "Times New Roman", Times, serif;
            font-size: 18px;
            color: rgb(0, 0, 0);
            text-align: center;
            background-color: aquamarine;
            padding: 10px;
        }
        .para2 {
            font-family: 'Verdana', sans-serif;
            font-size: 20px;
            color: red;
            text-align: left;
            border: 2px solid black;
            padding: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <p class="para1">This is an example of using the class selector. This paragraph uses the Times New Roman font family and centered text alignment with an aquamarine background.</p>
    <p class="para2">This is another paragraph styled via a different class. It has a Verdana font family, red text, a border, and specific spacing.</p>
</body>
</html>
